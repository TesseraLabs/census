# Structural list of access-relevant PCI DSS 4.0 controls for the gap-oracle. This
# file carries NO human-readable text: a requirement's title lives in the l10n tree
# (l10n/<locale>/controls.toml, keyed by the same requirement number) so a translator
# contributes wording without touching the compliance structure a reviewer signs off
# on — and the structural file stays free of any copyrighted PCI SSC wording.
# owned=true — Census domain (role accounts/groups/sudo grants); owned=false — outside
# the domain (auth = Tessera, logging policy = device/Tessera), NOT counted toward coverage.
# Keys are quoted: a dot in TOML is a separator, so control-id "7.2.1" must be a string.

["7.2.1"]
domain = "rbac"
owned  = true

["7.2.2"]
domain = "least-privilege"
owned  = true

["7.2.4"]
domain = "review"
owned  = true

["7.2.5"]
domain = "service-accounts"
owned  = true

["7.2.6"]
domain = "audit-access"
owned  = true

["7.3.1"]
domain = "enforcement"
owned  = true

["7.3.2"]
domain = "enforcement"
owned  = true

["8.2.1"]
domain = "identification"
owned  = false

["10.2.1"]
domain = "logging"
owned  = false

["10.5.1"]
domain = "logging"
owned  = false
