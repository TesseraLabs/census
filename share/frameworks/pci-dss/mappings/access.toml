# Маппинг разрешений каталога Census → control-id PCI DSS 4.0, с полярностью связи.
# Ключ = id разрешения. satisfies — способность адресует контроль; risk — способность
# контроль подрывает; related — нейтрально касается области (вне домена Census).
# Границы домена — через owned в controls.toml.

# управление учётками/ролями; конфликтует с моделью роль-учётки — выдаётся редко.
# 7.2.4 (периодический пересмотр прав) НЕ маппится: это процесс/Control-фича, не грант
# разрешения — остаётся честным gap в coverage.
[user-admin]
satisfies = ["7.2.1", "7.2.5"]

# политика sudo = применение наименьших привилегий
[sudo-config]
satisfies = ["7.2.2", "7.3.1"]

# контроль удалённого доступа
[ssh-admin]
satisfies = ["7.3.2"]

# роль-ограниченный доступ на чтение данных аудита
[log-read]
satisfies = ["7.2.6"]

# auth-конфиг; идентификация/пароли/MFA = Tessera (8.2.1 owned=false): нейтрально касается.
[pam-config]
related = ["8.2.1"]

# грант способности аудита; политика журналирования вне домена (10.2.1 owned=false):
# нейтрально касается, не удовлетворяет.
[audit-config]
related = ["10.2.1"]

# ротация/очистка журналов УГРОЖАЕТ целостности журналов аудита (10.5.1):
# способность подрывает контроль, а не удовлетворяет его.
[log-admin]
risk = ["10.5.1"]
