# Mapping of Census catalog permissions → CIS Control 6 Safeguards (Access Control Management),
# with link polarity. satisfies — the capability addresses the Safeguard.

# access grant/revoke processes; rarely granted in the Census model
[user-admin]
satisfies = ["6.1", "6.2"]

# role-based permission model via sudo policy
[sudo-config]
satisfies = ["6.8"]

# granting remote access
[ssh-admin]
satisfies = ["6.1"]
