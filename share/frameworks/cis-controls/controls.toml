# List of CIS Control 6 Safeguards for the gap-oracle. title is paraphrased (not CIS text).
# owned=true — Census domain (role accounts/groups/sudo grants, RBAC); owned=false — outside the domain
# (6.7 centralization via a directory = the opposite of Census's offline model), NOT included in the gap.
# Keys are quoted: a dot in TOML is a separator, so Safeguard "6.1" must be a string.

["6.1"]
title  = "Установлен процесс предоставления доступа"
domain = "grant"
owned  = true

["6.2"]
title  = "Установлен процесс отзыва доступа"
domain = "revoke"
owned  = true

["6.7"]
title  = "Централизация управления доступом через службу каталога/SSO"
domain = "centralization"
owned  = false

["6.8"]
title  = "Ролевая модель управления доступом (RBAC)"
domain = "rbac"
owned  = true
