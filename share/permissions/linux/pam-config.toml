id       = "pam-config"
risk     = "escalation-capable"
category = "identity"
sudo     = ["/usr/sbin/pam-auth-update", "/usr/bin/pam_tally2", "/usr/sbin/faillock"]

# The PAM stack and the security/ policy dir (pwquality, limits, faillock) are
# the edited config areas; both rewrite the local auth path (root-equivalent).
[[file]]
path      = "/etc/pam.d"
access    = "rw"
recursive = true

[[file]]
path      = "/etc/security"
access    = "rw"
recursive = true
