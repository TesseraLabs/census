id       = "apache2.operate"
risk     = "contained"
category = "app"
# Curated operate package for the Apache HTTP server: read-only observe
# (service-observe on the `apache2` unit) plus service-control on the same unit
# and READ-ONLY config + logs (the ro convention components). Lifecycle + read
# only — NO rw config — so this stays contained.
#
# rw on /etc/apache2 is escalation-capable and lives in apache2.admin: the apache
# master process runs as root and LoadModule / Include directives load code into
# that root master, so rw on the config tree is a root code-load path, not a
# contained operate.
#
# Values verified against apache2 on Debian 12 (unit apache2, config
# /etc/apache2, logs /var/log/apache2). RHEL/SUSE name the unit `httpd` — that
# delta lands in a linux-<distro> layer once verified.
includes = [
    { id = "service-observe", units = "apache2" },
    { id = "service-control", units = "apache2" },
    { id = "app-config-ro", app = "apache2" },
    { id = "app-logs-ro", app = "apache2" },
]
