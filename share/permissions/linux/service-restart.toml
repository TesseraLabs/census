id       = "service-restart"
risk     = "contained"
category = "os-config"
# Parametrized: the role supplies `units = [...]`. The placeholder name must
# match the param key EXACTLY (the engine does literal-name matching, no
# singular/plural inference), so the placeholder is `{units}`. A list param
# expands to one rendered Cmnd per element. sudoers matches argv exactly, so
# BOTH the bare `{units}` and the `{units}.service` forms are emitted explicitly
# here — the engine is a generic substitutor and does not synthesise alternative
# unit-name forms.
sudo = [
    "/usr/bin/systemctl start {units}",
    "/usr/bin/systemctl start {units}.service",
    "/usr/bin/systemctl stop {units}",
    "/usr/bin/systemctl stop {units}.service",
    "/usr/bin/systemctl restart {units}",
    "/usr/bin/systemctl restart {units}.service",
    "/usr/bin/systemctl status {units}",
    "/usr/bin/systemctl status {units}.service",
    "/usr/bin/systemctl is-active {units}",
    "/usr/bin/systemctl is-active {units}.service",
    "/usr/bin/systemctl reset-failed {units}",
    "/usr/bin/systemctl reset-failed {units}.service",
]
