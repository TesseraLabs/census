id       = "pcscd.admin"
risk     = "escalation-capable"
category = "app"
# Curated admin package for the PC/SC smartcard resource manager (pcscd):
# service-control on BOTH the daemon unit `pcscd` and its activating socket unit
# `pcscd.socket` (socket-activated), plus rw on the driver config tree
# /etc/reader.conf.d (bound via the convention component, app = "reader.conf.d").
#
# This is escalation-capable, NOT a contained operate: pcscd runs as root, and a
# reader.conf.d entry sets LIBPATH to a CCID driver shared object that pcscd loads
# into its own root process. So rw on /etc/reader.conf.d is a direct root
# code-load path — point LIBPATH at an attacker-controlled .so and pcscd (root)
# dlopen()s it. The file access is contained ACL, but the content it grants write
# to is a root code-load surface.
#
# Values verified against pcscd on Debian 12 (units pcscd + pcscd.socket, config
# /etc/reader.conf.d, daemon runs as root). Per-OS unit/path deltas land in
# linux-<distro> layers once verified — unverified values are not shipped.
includes = [
    { id = "service-control", units = "pcscd" },
    { id = "service-control", units = "pcscd.socket" },
    { id = "app-config-rw", app = "reader.conf.d" },
]
