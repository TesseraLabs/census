id       = "cups.observe"
risk     = "contained"
category = "app"
# Curated read-only package for CUPS — the print server. Pins service-observe to
# the unit `cups` and binds the ro config convention component (config tree
# /etc/cups follows /etc/{app}). Contained: read-only status + ro ACL on
# /etc/cups, no root path.
#
# Values verified against cups on Debian 12 (unit cups, config /etc/cups). Per-OS
# unit/path deltas land in linux-<distro> layers once verified — unverified
# values are not shipped.
includes = [
    { id = "service-observe", units = "cups" },
    { id = "app-config-ro", app = "cups" },
]
