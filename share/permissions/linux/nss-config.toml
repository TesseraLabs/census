id       = "nss-config"
risk     = "escalation-capable"
category = "identity"
sudo     = ["/usr/sbin/sssctl", "/usr/bin/systemctl restart sssd", "/usr/bin/kinit"]

# SSSD config tree (sssd.conf + conf.d). The bare /etc/nsswitch.conf is a single
# file and is deliberately NOT granted here (the free ACL backend only enforces
# directory grants); the SSSD directory is the rewrite-proof unit. Editing the
# identity-provider config is root-equivalent (it defines who can authenticate).
[[file]]
path      = "/etc/sssd"
access    = "rw"
recursive = true
