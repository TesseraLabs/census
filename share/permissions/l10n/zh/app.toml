[app-config-edit]
title     = "应用配置编辑"
summary   = "通过包装的编辑器编辑指定的应用配置文件（参数：path）。"
risk_note = "具备提权能力：编辑器以 root 运行且可派生 shell，因此无论编辑哪个文件都能获得 root；allow_prefix 限制目标文件，但不限制编辑器的逃逸。"

[app-scope]
title     = "按应用名授予的逐应用访问权限"
summary   = "按应用名授予的逐应用访问权限：管理该应用的服务（start/stop/restart）、编辑 /etc/<app>、读取 /var/log/<app>（参数：app）。"
risk_note = "受限（contained）：文件访问是对该应用自身 /etc 和 /var/log 目录树的 ACL，服务管理是受限的 service-control 权限（不使用以 root 运行的编辑器）。应用名是单个路径段／单元名——仅限普通单元名，不支持实例单元（name@inst）。"

[app-config-ro]
title     = "应用配置——只读"
summary   = "对应用自身配置目录树 /etc/<app> 的只读 ACL（参数：app）。"
risk_note = "对预期用途而言受限（contained）——应用自身的 /etc/<app> 配置目录树，并非 root 路径。segment 参数将 <app> 限定为 /etc 下的单个子目录（无 /、无 ..），但它仍可指向敏感目录；具体绑定值的安全性是策展／审查（供应链）问题，与 inline 授权完全相同。请勿将其指向系统目录。"

[app-config-rw]
title     = "应用配置——读写"
summary   = "对应用自身配置目录树 /etc/<app> 的读写 ACL（参数：app）。"
risk_note = "对预期用途而言受限（contained）——应用自身的 /etc/<app> 配置目录树，并非 root 路径。segment 参数将 <app> 限定为 /etc 下的单个子目录（无 /、无 ..），但它仍可指向敏感目录；具体绑定值的安全性是策展／审查（供应链）问题，与 inline 授权完全相同。请勿将其指向系统目录。"

[app-logs-ro]
title     = "应用日志——只读"
summary   = "对应用自身日志目录树 /var/log/<app> 的只读 ACL（参数：app）。"
risk_note = "对预期用途而言受限（contained）——应用自身的 /var/log/<app> 日志目录树，并非 root 路径。segment 参数将 <app> 限定为 /var/log 下的单个子目录（无 /、无 ..），但它仍可指向敏感目录；具体绑定值的安全性是策展／审查（供应链）问题，与 inline 授权完全相同。请勿将其指向系统目录。"

