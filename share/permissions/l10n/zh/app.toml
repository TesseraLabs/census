["mosquitto.observe"]
title     = "Mosquitto MQTT 代理——观察"
summary   = "对 Mosquitto 代理的只读访问：查询 mosquitto 服务状态，读取 /etc/mosquitto 和 /var/log/mosquitto。"
risk_note = "受限（contained）：只读服务状态，加上对代理自身配置与日志树的只读 ACL，无 root 路径。"

["mosquitto.operate"]
title     = "Mosquitto MQTT 代理——运维"
summary   = "运维 Mosquitto 代理：start/stop/restart mosquitto 服务，编辑 /etc/mosquitto（可读写），读取 /var/log/mosquitto。"
risk_note = "仅因 Debian 12 的 mosquitto 单元设置了 User=mosquitto 才受限（contained）。这并非像 redis 那样的结构性非 root：mosquitto 以 root 启动，依据 /etc/mosquitto（此处授予可读写的那棵树）中的 `user` 指令自行降权，因此真正将其固定为非特权的是单元上的 User=mosquitto。在该固定下，对 /etc/mosquitto 的可读写仅能触及 mosquitto 用户——可读写包含 acl_file/password_file（绕过代理 authn/authz），auth_plugin 以 mosquitto 用户身份加载 .so（代码执行受限于该用户，而非 root）。注意：在任何省略 User= 而依赖配置自降权的 per-OS 层上，可读写配置 + 重启即为 root 路径（清空 `user`，重启 → 代理以 root 启动，auth_plugin .so 以 root 加载）；此类层必须先确认存在 User=mosquitto，才能将 operate 作为 contained 发布。在 Debian 12 上无需管理（admin）层级。"

["pcscd.observe"]
title     = "PC/SC 智能卡守护进程——观察"
summary   = "对 pcscd 的只读访问：查询 pcscd 与 pcscd.socket 单元状态，读取 /etc/reader.conf.d。"
risk_note = "受限（contained）：只读服务状态（守护进程及其套接字激活单元），加上对驱动配置树 /etc/reader.conf.d 的只读 ACL，无 root 路径。"

["pcscd.operate"]
title     = "PC/SC 智能卡守护进程——运维"
summary   = "运维 pcscd：start/stop/restart pcscd 与 pcscd.socket 单元，并通过 device-usb leaf（plugdev/scanner 组）访问 USB CCID 读卡器。"
risk_note = "受限（contained）：对守护进程及其套接字激活单元的受限服务管理，加上通过 device-usb leaf（plugdev/scanner 组）的受限 USB 读卡器访问。不含对 /etc/reader.conf.d 的可读写，因此没有 root 加载 .so 的路径——那属于 pcscd.admin。"

["pcscd.admin"]
title     = "PC/SC 智能卡守护进程——管理"
summary   = "管理 pcscd：start/stop/restart pcscd 与 pcscd.socket 单元，编辑 /etc/reader.conf.d（可读写）。"
risk_note = "具备提权能力：pcscd 以 root 运行，/etc/reader.conf.d 中的条目将 LIBPATH 指向某个 CCID 驱动共享对象，pcscd 会将其 dlopen() 加载进自身的 root 进程。因此对 /etc/reader.conf.d 的可读写是直接的 root 代码加载路径——将 LIBPATH 指向攻击者控制的 .so，pcscd（root）便会加载它。因此它属于管理（admin），而非受限的 operate。（pcscd 采用套接字激活，因此 pcscd 与 pcscd.socket 两个单元都受控。）"

