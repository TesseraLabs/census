[network-diag]
title     = "Диагностика сети"
summary   = "Чтение состояния сокетов, линков и достижимости (ss, ip, mtr, ping)."
risk_note = "Только чтение: показывает состояние и счётчики, ничего не меняет."

[network-admin]
title     = "Администрирование сети"
summary   = "Настройка интерфейсов, адресов, линков и соединений (ip, nmcli)."
risk_note = "Фактически root: `ip netns exec` выполняет произвольные команды в namespace."

[firewall-admin]
title     = "Администрирование межсетевого экрана"
summary   = "Управление правилами пакетного фильтра (nft, iptables/ip6tables, restore)."
risk_note = "Переписывание правил отключает или обходит сетевую политику хоста."

[packet-capture]
title     = "Захват трафика"
summary   = "Снятие и разбор трафика на интерфейсах (tcpdump, tshark)."
risk_note = "tcpdump `-z postrotate` выполняет команду — путь к произвольному коду от root."

[dns-config]
title     = "Настройка DNS-резолвера"
summary   = "Управление состоянием резолвера и DNS по линкам (resolvectl)."
risk_note = "Подмена резолва — вектор MITM для любого разрешения имён на хосте."

[vpn-admin]
title     = "Администрирование VPN"
summary   = "Поднятие и настройка туннелей WireGuard (wg, wg-quick, resolvectl)."
risk_note = "Конфигурация туннеля может перенаправить трафик и переопределить DNS всего хоста."

[route-admin]
title     = "Администрирование маршрутизации"
summary   = "Управление таблицей маршрутизации ядра (ip route)."
risk_note = "Добавление маршрута может тихо увести трафик на узел злоумышленника."
