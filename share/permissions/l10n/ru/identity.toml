[admin]
title     = "Администратор"
summary   = "Выдаёт платформенную admin-группу (sudo); слои дистрибутива добавляют ОС-специфичные admin-группы."
risk_note = "Полные административные полномочия — кураторское решение, никогда не по умолчанию."

[console-access]
title     = "Доступ к локальной консоли"
summary   = "Членство для локальной консоли; слои дистрибутива добавляют ОС-группу консоли."
risk_note = "Contained: только физическая/локальная консоль, сам по себе без удалённых или привилегированных команд."

[ssh-admin]
title     = "Администрирование SSH"
summary   = "Управление и перезапуск демона SSH (sshd, systemctl restart ssh)."
risk_note = "Открывает удалённый вход — против офлайн-предпосылки парка."

[user-admin]
title     = "Администрирование пользователей"
summary   = "Создание, изменение и удаление пользователей и паролей (useradd, usermod, passwd)."
risk_note = "Конфликт с моделью роль-учёток Census: позволяет обойти управляемые учётки — жёсткий lint-warning, не для рядовых ролей."

[sudo-config]
title     = "Настройка sudoers"
summary   = "Правка политики sudoers (visudo)."
risk_note = "Прямой путь к root: может выдать себе неограниченный sudo — почти никогда не выдаётся."

[pam-config]
title     = "Настройка PAM"
summary   = "Управление стеком аутентификации PAM (pam-auth-update, faillock)."
risk_note = "Управляет тем, как работает аутентификация — может ослабить или обойти проверки входа."

[nss-config]
title     = "Настройка NSS / каталога"
summary   = "Настройка разрешения имён и SSSD/Kerberos (sssctl, restart sssd, kinit)."
risk_note = "Переопределение источников идентичности может изменить, кто отображается на какой uid/группы."

[polkit-config]
title     = "Настройка polkit"
summary   = "Осмотр и перезагрузка авторизации polkit (pkaction, restart polkit)."
risk_note = "Правила polkit управляют привилегированными действиями — разрешающее правило это путь к эскалации."
