[time-set]
title     = "Системное время"
summary   = "Установка системных и аппаратных часов (timedatectl, hwclock)."
risk_note = "Время влияет на свежесть отзыва и срок действия сертификатов — сдвиг может сорвать проверки."

[locale-config]
title     = "Настройка локали"
summary   = "Установка системной локали и раскладки (localectl)."
risk_note = "Contained: косметические настройки локали/раскладки."

[hostname-config]
title     = "Настройка имени хоста"
summary   = "Установка имени хоста системы (hostnamectl)."
risk_note = "Contained: только метка-идентификатор, без влияния на привилегии."

[service-restart]
title     = "Перезапуск служб (по списку)"
summary   = "Старт/стоп/перезапуск/опрос поимённых юнитов systemd (параметр: units)."
risk_note = "Ограничено только указанными юнитами; sudoers матчит аргументы точно, расширить охват нельзя."

[service-admin]
title     = "Администрирование служб"
summary   = "Полное управление юнитами systemd (systemctl)."
risk_note = "Любой юнит можно задать или запустить — фактически выполнение произвольного кода от root."

[timer-admin]
title     = "Администрирование таймеров"
summary   = "Вкл/выкл, старт и стоп таймеров systemd (параметр: timers)."
risk_note = "Ограничено указанными таймерами; чтобы задать враждебный юнит, нужен отдельный service-admin."

[power-control]
title     = "Управление питанием"
summary   = "Перезагрузка, остановка и выключение хоста (shutdown, reboot, poweroff)."
risk_note = "Может остановить хост посреди транзакции — влияние на доступность, без роста привилегий."

[session-terminate]
title     = "Завершение сессий"
summary   = "Завершение пользовательских сессий и входов (loginctl, параметры: user/session)."
risk_note = "Может принудительно разлогинить пользователей — отказ в обслуживании активных сессий."

[boot-config]
title     = "Настройка загрузчика"
summary   = "Перегенерация и установка загрузчика GRUB (update-grub, grub-install)."
risk_note = "Управляет загрузкой: может задать параметры ядра или загрузить неподписанный код при перезагрузке."

[kernel-cmdline]
title     = "Командная строка ядра"
summary   = "Правка параметров загрузки ядра через GRUB (update-grub)."
risk_note = "Флаги cmdline могут отключить защитные механизмы (напр. lockdown, IOMMU) при следующей загрузке."

[initramfs-admin]
title     = "Администрирование initramfs"
summary   = "Пересборка образа initramfs (update-initramfs, mkinitramfs)."
risk_note = "Код в initramfs исполняется до ОС — вектор персистентности и предзагрузочной подмены."

[cron-admin]
title     = "Администрирование cron"
summary   = "Управление заданиями планировщика (crontab, /etc/cron.d)."
risk_note = "Запланированное задание от root — классический вектор персистентности."

[logind-config]
title     = "Настройка logind"
summary   = "Перезапуск systemd-logind для применения настроек менеджера входа."
risk_note = "Contained: перезапускает службу менеджера входа."
