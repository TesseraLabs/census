[driver-config]
title     = "Настройка модулей ядра / драйверов"
summary   = "Загрузка, выгрузка и осмотр модулей ядра (modprobe, rmmod, modinfo)."
risk_note = "Загрузка модуля — это код в ядре, полностью эквивалентно root."

[firmware-update]
title     = "Обновление прошивок"
summary   = "Прошивка устройств через системный апдейтер (fwupdmgr)."
risk_note = "Персистентность ниже ОС: дефектная или вредоносная прошивка переживает переустановку."

[kernel-tune]
title     = "Тюнинг параметров ядра"
summary   = "Чтение и установка параметров ядра во время работы (sysctl)."
risk_note = "Управляет ASLR, ptrace_scope и защитой сети — может ослабить оборону хоста."

[device-serial]
title     = "Доступ к последовательным устройствам"
summary   = "Доступ к COM-портам через группу dialout (/dev/ttyS*, /dev/ttyUSB*)."
risk_note = "Contained: прямой канал к периферии банкомата/ПЛК, без роста привилегий хоста."

[device-usb]
title     = "Доступ к USB / съёмным устройствам"
summary   = "Доступ к подключаемым носителям и монтирование через udisksctl (группа plugdev)."
risk_note = "Contained, но монтирование недоверенного носителя — точка входа для враждебных файлов."

[device-bus]
title     = "Доступ к встраиваемым шинам"
summary   = "Доступ к шинам I2C, GPIO и SPI (группы i2c, gpio, spi)."
risk_note = "Contained: общение со встраиваемыми контроллерами; без эскалации на обычном хосте."

[device-video]
title     = "Доступ к видео / GPU-устройствам"
summary   = "Доступ к GPU, камерам и устройствам дисплея (группы video, render)."
risk_note = "Contained: только доступ к устройствам, без роста привилегий хоста."

[hardware-inventory]
title     = "Инвентаризация оборудования"
summary   = "Чтение идентификаторов платы и устройств, данных DMI/SMBIOS (lshw, dmidecode)."
risk_note = "Читает серийники и сведения о железе — инвентарные данные, без изменения состояния."

[capability-admin]
title     = "Администрирование file capabilities"
summary   = "Установка и чтение capabilities у бинарей (setcap, getcap)."
risk_note = "setcap может дать бинарю root-эквивалентные права (напр. cap_setuid) — путь к эскалации."

[tpm-admin]
title     = "Администрирование TPM"
summary   = "Привязка ключей и чтение состояния TPM (systemd-cryptenroll, tpm2_*)."
risk_note = "Управляет привязкой разблокировки диска — может переназначить ключи, расшифровывающие тома."
