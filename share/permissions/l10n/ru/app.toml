["mosquitto.observe"]
title     = "MQTT-брокер Mosquitto — наблюдение"
summary   = "Только чтение для брокера Mosquitto: запрос статуса сервиса mosquitto и чтение /etc/mosquitto и /var/log/mosquitto."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на собственные деревья конфигов и логов брокера, без пути к root."

["mosquitto.operate"]
title     = "MQTT-брокер Mosquitto — управление"
summary   = "Управление брокером Mosquitto: start/stop/restart сервиса mosquitto, правка /etc/mosquitto (rw), чтение /var/log/mosquitto."
risk_note = "Contained ТОЛЬКО потому, что юнит mosquitto в Debian 12 задаёт User=mosquitto. Это НЕ структурный non-root, как у redis: mosquitto стартует под root и сам сбрасывает привилегии по директиве `user` из /etc/mosquitto (того самого дерева, которое здесь даётся под rw), поэтому именно User=mosquitto на юните реально пинит его непривилегированным. При этом пине rw /etc/mosquitto достаёт только до пользователя mosquitto: rw включает acl_file/password_file (обход authn/authz брокера), а auth_plugin грузит .so под пользователем mosquitto (выполнение кода ограничено этим пользователем, не root). Оговорка: на любом per-OS слое, чей юнит НЕ задаёт User= и полагается на self-drop из конфига, rw-конфиг + restart — это путь к root (обнулить `user`, restart → брокер поднимается под root, auth_plugin .so грузится под root); такой слой обязан проверить наличие User=mosquitto, прежде чем поставлять operate как contained. На Debian 12 тир admin не нужен."

["pcscd.observe"]
title     = "Демон смарт-карт PC/SC — наблюдение"
summary   = "Только чтение для pcscd: запрос статуса юнитов pcscd и pcscd.socket и чтение /etc/reader.conf.d."
risk_note = "Contained: только чтение статуса сервиса (демон и его юнит сокет-активации) плюс ACL ro на дерево конфигов драйверов /etc/reader.conf.d, без пути к root."

["pcscd.operate"]
title     = "Демон смарт-карт PC/SC — управление"
summary   = "Управление pcscd: start/stop/restart юнитов pcscd и pcscd.socket и доступ к USB CCID-ридерам через leaf device-usb (группы plugdev/scanner)."
risk_note = "Contained: ограниченное управление демоном и его юнитом сокет-активации плюс contained-доступ к USB-ридеру через leaf device-usb (группы plugdev/scanner). Без rw на /etc/reader.conf.d, поэтому нет пути к загрузке .so под root — это pcscd.admin."

["pcscd.admin"]
title     = "Демон смарт-карт PC/SC — администрирование"
summary   = "Администрирование pcscd: start/stop/restart юнитов pcscd и pcscd.socket и правка /etc/reader.conf.d (rw)."
risk_note = "Escalation-capable: pcscd работает под root, а запись в /etc/reader.conf.d задаёт LIBPATH на разделяемый объект CCID-драйвера, который pcscd через dlopen() загружает в свой root-процесс. Поэтому rw на /etc/reader.conf.d — прямой путь к загрузке кода под root: укажите LIBPATH на подконтрольный .so, и pcscd (root) загрузит его. Именно поэтому это admin, а не contained operate. (pcscd сокет-активируется, поэтому управляются оба юнита: pcscd и pcscd.socket.)"

["salt-minion.observe"]
