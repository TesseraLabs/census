["node-red.observe"]
title     = "Node-RED — наблюдение"
summary   = "Только чтение для Node-RED: запрос статуса сервиса nodered и чтение userDir (по умолчанию /var/lib/node-red)."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на userDir, без мутаций, без пути к root. Путь userDir зависит от развёртывания: этот пакет по умолчанию использует /var/lib/node-red (соглашение для hardened/systemd-system), но userDir штатного UPSTREAM-установщика — /home/<user>/.node-red (закреплён через WorkingDirectory=$HOME); этот путь нельзя выразить литеральным inline-грантом, поэтому слой под ОС / роль его переопределяет. ВНИМАНИЕ: flows_cred.json в userDir хранит зашифрованные учётные данные узлов, поэтому доступ ro раскрывает этот материал."

["node-red.operate"]
title     = "Node-RED — управление"
summary   = "Управление Node-RED: start/stop/restart сервиса nodered, правка userDir (по умолчанию /var/lib/node-red, rw) и доступ к GPIO через leaf device-bus (группа gpio)."
risk_note = "Contained: штатная установка через systemd закрепляет Node-RED не под root через User= юнита (upstream закрепляет User=<invoking-user>), поэтому rw на userDir даёт исполнение команд только под этим сервисным пользователем (узел exec и child_process функционального узла выполняются под не-root пользователем node-red, не под root) — exec-as-app-user, не эскалация. Это прецедент redis (демон не под root → rw в operate, без admin-уровня). userDir здесь по умолчанию /var/lib/node-red (соглашение для hardened/systemd-system); userDir штатного установщика — /home/<user>/.node-red, который переопределяет слой под ОС / роль. GPIO через device-bus даёт группу gpio (цифровой ввод-вывод на /dev/gpiomem и /dev/gpiochip*), сам по себе contained leaf. ШИРОТА: device-bus также даёт группы i2c и spi, которые Node-RED не использует — на плате с i2c/spi EEPROM/TPM/RTC такой сырой доступ к шине — путь к аппаратному вмешательству (всё ещё contained, но обоснование gpio не распространяется на i2c/spi; более узкого leaf только для gpio не существует). flows_cred.json хранит зашифрованные учётные данные. ОГОВОРКА: распространённые любительские образы Pi запускают Node-RED под root или под pi с беспарольным sudo — на любом таком развёртывании rw flows = исполнение кода под root (узел exec выполняется под root), поэтому слой должен быть переоценён и переместить rw-конфиг в эскалационный уровень node-red.admin перед поставкой operate как contained."

["greengrass.observe"]
title     = "AWS IoT Greengrass v2 — наблюдение"
summary   = "Только чтение для Greengrass v2: запрос статуса сервиса ядра greengrass и чтение /greengrass/v2/logs."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на дерево логов ядра, без пути к root. Конфиг (/greengrass/v2/config) намеренно НЕ включён даже в режиме чтения — он содержит приватный ключ и сертификат устройства, поэтому ro-грант на него — это раскрытие учётных данных; развёртывание, которому он нужен, осознанно добавляет ro-грант на уровне роли."

["greengrass.admin"]
title     = "AWS IoT Greengrass v2 — администрирование"
summary   = "Администрирование Greengrass v2: start/stop/restart сервиса ядра greengrass и правка /greengrass/v2/config (rw)."
risk_note = "Escalation-capable, и contained-уровня operate НЕТ: установщик Greengrass требует sudoers-записи с sudo-ALL (root-эквивалент), а ядро работает под root и запускает компоненты (часть — под root). rw на /greengrass/v2/config переписывает рецепты/скрипты жизненного цикла компонентов, которые исполняет root-ядро, — путь к исполнению кода под root; в этом дереве также лежат приватный ключ и сертификат устройства. Управление Greengrass по своей природе требует root."

["azure-iot-edge.observe"]
title     = "Azure IoT Edge — наблюдение"
summary   = "Только чтение для Azure IoT Edge: запрос статуса сервиса aziot-edged и чтение /etc/aziot."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на дерево конфигурации, без пути к root. ВНИМАНИЕ: /etc/aziot содержит идентичность подготовки устройства и ключи/сертификаты, которыми демон аутентифицируется в IoT Hub, поэтому даже доступ ro раскрывает этот материал — раскрытие учётных данных, не эскалация."

["azure-iot-edge.admin"]
title     = "Azure IoT Edge — администрирование"
summary   = "Администрирование Azure IoT Edge: start/stop/restart демона безопасности aziot-edged, правка /etc/aziot (rw) и управление сокетом Moby/Docker через группу docker."
risk_note = "Escalation-capable, и contained-уровня operate НЕТ: edgeAgent управляет жизненным циклом рабочих модулей через сокет Docker, а группа docker — это и есть тот сокет, который является root-эквивалентом (монтирование корня хоста, --privileged). aziot-edged — привилегированный демон безопасности, а rw на /etc/aziot перенаправляет устройство на подконтрольную атакующему подготовку/сертификаты и меняет, какие модули (и CreateOptions/Binds) привилегированный демон запускает через root-сокет docker, — путь к исполнению кода под root."

["edgex.observe"]
title     = "EdgeX Foundry — наблюдение"
summary   = "Только чтение для EdgeX Foundry (развёртывание snap): запрос статуса snap-сервисов (по умолчанию snap.edgexfoundry.core-data + .device-modbus) и чтение дерева конфигурации snap под /var/snap/edgexfoundry/current."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на дерево конфигурации snap, без мутаций. Это нацелено на SNAP EdgeX — единственное развёртывание, устанавливающее systemd-юниты (docker-compose — это контейнеры без юнитов). Сервисы snap работают ПОД ROOT (без пина User=), поэтому rw-конфиг — эскалация (edgex.admin), но наблюдение в режиме чтения остаётся contained. Набор юнитов зависит от развёртывания (EdgeX состоит из множества юнитов snap.edgexfoundry.<service>); роль его переопределяет. Конфигурация лежит под /var/snap/edgexfoundry/current (раскладка данных snap, НЕ /etc/edgex); точный подпуть закрепляется под развёртывание."

["edgex.operate"]
title     = "EdgeX Foundry — управление"
summary   = "Управление EdgeX Foundry (развёртывание snap): start/stop/restart snap-сервисов (по умолчанию snap.edgexfoundry.core-data + .device-modbus), чтение дерева конфигурации snap (только чтение) и доступ к последовательным устройствам для Modbus RTU (device-serial, группа dialout)."
risk_note = "Contained: жизненный цикл плюс только чтение конфигурации. Сервисы snap EdgeX работают ПОД ROOT (без пина User=), поэтому rw-конфиг — эскалация и держится ВНЕ operate (он живёт в edgex.admin) — это форма root-демона rsyslog/salt-minion, НЕ форма operate-под-не-root redis/telegraf. Запуск/остановка snap-сервиса исполняет только проверенную конфигурацию на диске; оператор не может внести новый код, потому что конфигурация остаётся ro. device-serial несёт группу dialout для последовательного доступа Modbus RTU, сам по себе contained leaf. Набор юнитов и путь конфигурации зависят от развёртывания (см. observe)."

["edgex.admin"]
title     = "EdgeX Foundry — администрирование"
summary   = "Администрирование EdgeX Foundry (развёртывание snap): start/stop/restart snap-сервисов и правка дерева конфигурации snap под /var/snap/edgexfoundry/current (rw)."
risk_note = "Escalation-capable: сервисы snap EdgeX работают ПОД ROOT (без пина User=). Конфигурация на сервис задаёт эндпоинты device-сервисов, настройки драйверов и адреса bind/реестра/хранилища секретов, которые загружают root-сервисы, поэтому rw на дереве конфигурации snap переконфигурирует то, к чему подключаются и что загружают root-сервисы, — путь к root-уровневой переконфигурации / влиянию на код. Это форма rsyslog/salt-minion (root-демон → rw-конфиг — эскалация, держится в admin)."

["x11vnc.observe"]
title     = "x11vnc — наблюдение"
summary   = "Только чтение для x11vnc: запрос статуса сервиса x11vnc."
risk_note = "Contained: только чтение статуса юнита. Файл пароля не выдаётся (у файла -rfbauth x11vnc нет фиксированного системного пути — обычно ~/.vnc/passwd или путь из флагов юнита). ВНИМАНИЕ: x11vnc экспортирует живую X-сессию (просмотр экрана плюс инъекция ввода клавиатуры/мыши), когда работает, поэтому это высокочувствительная возможность — само наблюдение даёт лишь статус."

["x11vnc.operate"]
title     = "x11vnc — управление"
summary   = "Управление x11vnc: start/stop/restart сервиса x11vnc и подключение к локальной графической сессии (console-access)."
risk_note = "Высокочувствительно даже будучи contained: x11vnc даёт полный контроль над живой сессией — содержимое экрана И инъекцию ввода клавиатуры/мыши (интерактивный удалённый контроль, не просмотр). Contained ТОЛЬКО для случая киоска / сессии гостевого пользователя (инъекция в не-root сессию киоска, а console-access — contained leaf). ОГОВОРКА ПРО ROOT-:0: если x11vnc вместо этого подключается к экрану входа / менеджеру дисплея на :0, он работает ПОД ROOT и инъектирует в root-сессию входа = эскалация, НЕ contained — такое развёртывание НЕ должно поставлять x11vnc.operate как contained и должно использовать отдельный root-уровень. Проверьте, к какому дисплею подключается x11vnc, прежде чем доверять метке contained."

["chromium.observe"]
title     = "Chromium-киоск — наблюдение"
summary   = "Только чтение для Chromium-киоска: запрос статуса юнита сессии киоска и чтение корпоративного дерева управляемых политик /etc/chromium/policies/managed (только чтение)."
risk_note = "Contained: только чтение статуса юнита плюс ACL ro на дереве управляемых политик, без изменений. Утверждение «без root-пути» верно для базовой линии, где сессия киоска запускает браузер как не-root гостевого пользователя (см. оговорку про run-as-user в operate/admin); наблюдение в любом случае только-чтение и остаётся contained. Chromium — не демон; привилегированные поверхности здесь это root-owned управляемая политика и юнит сессии киоска, а не сам браузер. Имя юнита сессии киоска ЗАВИСИТ ОТ РАЗВЁРТЫВАНИЯ (autologin lightdm / собственный kiosk.service / getty-autologin + .xinitrc); `kiosk` — это значение по умолчанию, которое роль переопределяет. Google Chrome читает политики из соседнего пути /etc/opt/chrome/policies/managed — это per-OS/variant дельта, которую слой добавляет после проверки, здесь НЕ поставляется."

["chromium.operate"]
title     = "Chromium-киоск — управление"
summary   = "Управление Chromium-киоском: start/stop/restart юнита сессии киоска и чтение дерева управляемых политик /etc/chromium/policies/managed (только чтение)."
risk_note = "Contained: ограниченное управление сессией плюс политика только для чтения — без rw. Перезапуск сессии исполняет только проверенную политику на диске; оператор не может ослабить блокировку, потому что политика остаётся только для чтения. rw на управляемой политике удерживается в chromium.admin (уровень авторинга блокировки), а не свёрнут в operate — это разделение как у pcscd/rsyslog, обусловленное поверхностью побега из киоска (целостность). ОГОВОРКА ПРО RUN-AS-USER: contained ПРЕДПОЛАГАЕТ, что юнит сессии `kiosk` запускает браузер под не-root пользователем — это свойство конкретного юнита, а не интринсик (та же зависимость от развёртывания, что User= у mosquitto и :0 у x11vnc). Per-OS слой / роль, чей юнит сессии запускает Chromium под root (без User=, либо подключение к `:0`/менеджеру дисплея), НЕ должны поставлять chromium.operate/admin как contained без проверки run-as-user юнита — браузер под root читает политику как root, поэтому rw-политика + перезапуск становятся root-путём исполнения кода. ЗАВИСЯЩИЕ ОТ РАЗВЁРТЫВАНИЯ юнит сессии киоска и вариант пути политик Google Chrome: см. chromium.observe."

["chromium.admin"]
title     = "Chromium-киоск — администрирование"
summary   = "Администрирование блокировки Chromium-киоска: start/stop/restart юнита сессии киоска и правка корпоративного дерева управляемых политик /etc/chromium/policies/managed (rw)."
risk_note = "Contained, НЕ эскалация НА БАЗОВОЙ ЛИНИИ: файлы управляемой политики принадлежат root, но Chromium ЧИТАЕТ их как непривилегированный гостевой пользователь браузера, поэтому rw НЕ исполняет код под root — максимум это контроль над браузером гостевого уровня. НО это критичная для безопасности поверхность ЦЕЛОСТНОСТИ (чувствительно-но-contained, как authn-bypass у mosquitto.admin): rw позволяет ОБНУЛИТЬ/ОСЛАБИТЬ политику → ПОБЕГ ИЗ КИОСКА с прохода (file://, произвольная навигация, DevTools), а также ПРИНУДИТЕЛЬНО УСТАНОВИТЬ расширения / задать хосты NATIVE-MESSAGING → исполнение кода гостевого уровня внутри пользователя браузера (всё равно не root). ОГОВОРКА ПРО RUN-AS-USER: факт «гостевой пользователь» — свойство конкретного юнита `kiosk`, а не интринсик (та же зависимость от развёртывания, что User= у mosquitto и :0 у x11vnc). Если сессия `kiosk` запускает Chromium под ROOT (без User=, либо подключение к `:0`/менеджеру дисплея), браузер под root читает переписанную политику как root → rw-политика + перезапуск принудительно устанавливают код ПОД ROOT = эскалация, НЕ contained — такое развёртывание НЕ должно поставлять chromium.admin как contained без проверки run-as-user юнита. Оставлено отдельным уровнем admin, потому что авторинг блокировки — это отдельное действие по целостности, а не рутинное управление. ЗАВИСЯЩИЕ ОТ РАЗВЁРТЫВАНИЯ юнит сессии киоска и вариант пути политик Google Chrome: см. chromium.observe."
