risk_note = "Escalation-capable: rw на дерево конфигов postgres позволяет выставить pg_hba.conf в trust (любое локальное подключение становится суперпользователем БД) и shared_preload_libraries (загрузка кода, исполняемого в процессе postgres) — data-root плюс выполнение кода под пользователем postgres. Именно поэтому это admin, а не contained operate."

