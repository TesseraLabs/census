[app-config-edit]
title     = "Правка конфигов приложения"
summary   = "Правка конкретных конфигов приложения через обёрнутый редактор (параметр: path)."
risk_note = "Escalation-capable: редактор запускается под root и может породить shell, поэтому root достижим независимо от того, какой файл правится; allow_prefix ограничивает целевой файл, но не escape из редактора."

[app-scope]
title     = "Доступ к приложению по имени"
summary   = "Доступ к приложению по имени: управление сервисом приложения (start/stop/restart), правка /etc/<app>, чтение /var/log/<app> (параметр: app)."
risk_note = "Contained: доступ к файлам — это ACL на собственные деревья приложения /etc и /var/log, а управление сервисом — это ограниченное разрешение service-control (без редактора под root). Имя приложения — это один сегмент пути / имя юнита: только простые имена юнитов, не инстанс-юниты (name@inst)."

[app-config-ro]
title     = "Конфиг приложения — только чтение"
summary   = "ACL только на чтение собственного дерева конфигов приложения /etc/<app> (параметр: app)."
risk_note = "Contained для предполагаемого использования — собственное дерево конфигов приложения /etc/<app>, не путь к root. Параметр segment ограничивает <app> одним подкаталогом под /etc (без /, без ..), но он всё ещё может указать на чувствительный каталог; безопасность конкретного связанного значения — это вопрос курирования/ревью, ровно как для inline-гранта. Не направляйте его на системный каталог."

[app-config-rw]
title     = "Конфиг приложения — чтение и запись"
summary   = "ACL на чтение и запись собственного дерева конфигов приложения /etc/<app> (параметр: app)."
risk_note = "Contained для предполагаемого использования — собственное дерево конфигов приложения /etc/<app>, не путь к root. Параметр segment ограничивает <app> одним подкаталогом под /etc (без /, без ..), но он всё ещё может указать на чувствительный каталог; безопасность конкретного связанного значения — это вопрос курирования/ревью, ровно как для inline-гранта. Не направляйте его на системный каталог."

[app-logs-ro]
title     = "Логи приложения — только чтение"
summary   = "ACL только на чтение собственного дерева логов приложения /var/log/<app> (параметр: app)."
risk_note = "Contained для предполагаемого использования — собственное дерево логов приложения /var/log/<app>, не путь к root. Параметр segment ограничивает <app> одним подкаталогом под /var/log (без /, без ..), но он всё ещё может указать на чувствительный каталог; безопасность конкретного связанного значения — это вопрос курирования/ревью, ровно как для inline-гранта. Не направляйте его на системный каталог."

["zabbix-agent.observe"]
title     = "Zabbix-агент — наблюдение"
summary   = "Только чтение для Zabbix-агента: запрос статуса его сервиса и чтение /etc/zabbix и /var/log/zabbix."
risk_note = "Contained: только чтение статуса сервиса (без start/stop) плюс ACL ro на собственные деревья конфигов и логов агента, без пути к root."

["zabbix-agent.operate"]
title     = "Zabbix-агент — управление"
summary   = "Управление Zabbix-агентом: start/stop/restart его сервиса, правка /etc/zabbix (rw), чтение /var/log/zabbix (включает наблюдение)."
risk_note = "Contained: ограниченное управление сервисом юнита zabbix-agent плюс ACL-доступ к файлам (rw для конфигов, ro для логов), без пути к root."

["node-exporter.operate"]
title     = "Node exporter — управление"
summary   = "Управление Prometheus node exporter: start/stop/restart prometheus-node-exporter и правка /etc/default/prometheus-node-exporter."
risk_note = "Contained: ограниченное управление сервисом юнита prometheus-node-exporter плюс ACL rw на его единственный файл конфига, без пути к root."

["nut.operate"]
title     = "NUT — управление"
summary   = "Управление NUT (Network UPS Tools): start/stop/restart обоих юнитов nut-server и nut-monitor, чтение /etc/nut (конфиг только для чтения)."
risk_note = "Contained: ограниченное управление сервисом двух юнитов NUT плюс конфиг только для чтения, только жизненный цикл — без rw, без пути к root."

["nut.admin"]
title     = "NUT — администрирование"
summary   = "Администрирование NUT: start/stop/restart обоих юнитов nut-server и nut-monitor, правка /etc/nut (rw)."
risk_note = "Escalation-capable: upsmon держит привилегированный родительский процесс под root для выполнения SHUTDOWNCMD/NOTIFYCMD, поэтому rw на /etc/nut позволяет задать произвольный SHUTDOWNCMD в upsmon.conf и инициировать его (restart/FSD nut-monitor) → выполнение команды под root. Именно поэтому это admin, а не contained operate."

["filebeat.observe"]
title     = "Filebeat — наблюдение"
summary   = "Только чтение для Filebeat: запрос статуса сервиса и чтение /etc/filebeat."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на собственное дерево конфигов шиппера, без пути к root. Примечание: filebeat работает под root (он читает все логи); в конфиге нет выполнения кода, но шиппер под root, чей конфиг можно переписать, может быть перенаправлен на эксфильтрацию произвольных файлов, читаемых root, — contained, но security-relevant."

["filebeat.operate"]
title     = "Filebeat — управление"
summary   = "Управление Filebeat: start/stop/restart сервиса и правка /etc/filebeat (rw)."
risk_note = "Contained: ограниченное управление сервисом юнита filebeat плюс ACL rw на его дерево конфигов, без пути к root. Примечание: filebeat работает под root (он читает все логи); в конфиге нет выполнения кода, но rw-конфиг на шиппере под root позволяет перенаправить его на эксфильтрацию произвольных файлов, читаемых root, — contained, но security-relevant."

["ssh.observe"]
title     = "Сервер OpenSSH — наблюдение"
summary   = "Только чтение для сервера OpenSSH: запрос статуса сервиса ssh и чтение /etc/ssh."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на /etc/ssh, без изменений, без пути к root."

["ssh.admin"]
title     = "Сервер OpenSSH — администрирование"
summary   = "Администрирование сервера OpenSSH: start/stop/restart сервиса ssh и правка /etc/ssh (rw)."
risk_note = "Escalation-capable: rw на /etc/ssh позволяет править sshd_config (PermitRootLogin, AuthorizedKeysFile, ForceCommand, блоки Match) — прямой путь к входу под root. Именно поэтому это admin/escalation-capable, а не contained operate: доступ к файлам — это contained ACL, но контент, в который даётся запись, — это root-эквивалентная поверхность управления."

["usbguard.observe"]
