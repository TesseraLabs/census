risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на /etc/usbguard, без пути к root."

["usbguard.operate"]
title     = "USBGuard — управление"
summary   = "Управление USBGuard: start/stop/restart сервиса и правка /etc/usbguard (rw)."
risk_note = "Contained: правка правил USB-устройств в /etc/usbguard определяет, какие периферийные устройства допускаются, — это security-relevant, но не путь к root. Ограниченное управление сервисом плюс ACL-доступ к файлам, без пути к root."

["cups.observe"]
