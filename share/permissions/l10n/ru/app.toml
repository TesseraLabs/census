risk_note = "Contained: ограниченное управление сервисом плюс конфиг только для чтения — без rw, без пути к root. Поднятие интерфейса использует только проверенный конфиг на диске. rw на /etc/wireguard — это эскалация (PostUp/PostDown/PreUp/PreDown выполняются под root через wg-quick) и живёт в wireguard.admin, не в operate. ВНИМАНИЕ: /etc/wireguard хранит приватный ключ интерфейса, поэтому встроенный грант ro всё равно его раскрывает."

