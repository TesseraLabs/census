["cups.operate"]
title     = "CUPS — управление"
summary   = "Управление CUPS: start/stop/restart сервиса печати и чтение /etc/cups (конфиг только для чтения)."
risk_note = "Contained: ограниченное управление сервисом плюс конфиг только для чтения — без rw, без группы lpadmin, без пути к root."

["cups.admin"]
title     = "CUPS — администрирование"
summary   = "Администрирование CUPS: start/stop/restart сервиса печати, правка /etc/cups (rw) и управление принтерами через группу lpadmin."
risk_note = "Escalation-capable: cupsd работает под root, и rw на /etc/cups плюс lpadmin позволяет установить бэкенд/фильтр/PPD принтера, который cupsd затем запускает под root, — исторический класс root RCE. Именно поэтому это admin, а не contained operate."

