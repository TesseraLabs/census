summary   = "Только чтение для Salt minion: запрос статуса сервиса salt-minion и чтение /etc/salt и /var/log/salt."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на собственные деревья конфигов и логов миньона, без пути к root."

["salt-minion.operate"]
title     = "Salt minion — управление"
summary   = "Управление Salt minion: start/stop/restart сервиса salt-minion и чтение /etc/salt и /var/log/salt (конфиг и логи только для чтения)."
risk_note = "Contained: ограниченное управление сервисом плюс конфиг и логи только для чтения — без rw, без пути к root. rw на /etc/salt — это эскалация, она в salt-minion.admin."

["salt-minion.admin"]
title     = "Salt minion — администрирование"
summary   = "Администрирование Salt minion: start/stop/restart сервиса salt-minion и правка /etc/salt (rw)."
risk_note = "Escalation-capable: salt-minion работает под root, а /etc/salt/minion задаёт адрес master:, которому миньон подчиняется. rw на /etc/salt перенаправляет миньона на подконтрольный злоумышленнику Salt-мастер, который затем рассылает произвольные состояния/модули, исполняемые миньоном ПОД ROOT, — полный захват хоста. Именно поэтому это admin, а не contained operate."

["rsyslog.observe"]
title     = "rsyslog — наблюдение"
summary   = "Только чтение для rsyslog: запрос статуса сервиса rsyslog и чтение дерева drop-in /etc/rsyslog.d."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на дерево drop-in /etc/rsyslog.d, без пути к root. rsyslogd работает под root, поэтому rw на дерево drop-in был бы путём загрузки кода под root — но observe только ro, поэтому контейнмент сохраняется. Управляемая поверхность — дерево drop-in /etc/rsyslog.d (дефолтный $IncludeConfig /etc/rsyslog.d/*.conf rsyslog подтягивает все drop-in). Главный /etc/rsyslog.conf — вне области: это единственный системный файл, а census требует ACL уровня каталога для rewrite-proof доступа к конфигу (per-file ACL побеждается atomic-replace), поэтому один файл в /etc нельзя выдать rewrite-proof, не выдав весь /etc — и грант на один файл отклоняется на apply на целях без per-file бэкенда. Главный конфиг админы правят вне census."

["rsyslog.operate"]
title     = "rsyslog — управление"
summary   = "Управление rsyslog: start/stop/restart сервиса rsyslog и чтение дерева drop-in /etc/rsyslog.d (конфиг только для чтения)."
risk_note = "Contained: ограниченное управление сервисом плюс конфиг только для чтения — без rw, без пути к root. rsyslogd работает под root, поэтому rw-конфиг — это эскалация (omprog запускает программы под root, module(load=…) загружает .so в root-демон) и живёт в rsyslog.admin, не в operate. Управляемая поверхность — дерево drop-in /etc/rsyslog.d (дефолтный $IncludeConfig /etc/rsyslog.d/*.conf rsyslog подтягивает все drop-in). Главный /etc/rsyslog.conf — вне области: это единственный системный файл, а census требует ACL уровня каталога для rewrite-proof доступа к конфигу (per-file ACL побеждается atomic-replace), поэтому один файл в /etc нельзя выдать rewrite-proof, не выдав весь /etc — и грант на один файл отклоняется на apply на целях без per-file бэкенда. Главный конфиг админы правят вне census."

["rsyslog.admin"]
title     = "rsyslog — администрирование"
summary   = "Администрирование rsyslog: start/stop/restart сервиса rsyslog и правка дерева drop-in /etc/rsyslog.d (rw)."
risk_note = "Escalation-capable: rsyslogd работает под root, и rw на его дерево drop-in — это путь загрузки/исполнения кода под root: drop-in в /etc/rsyslog.d может нести модуль вывода omprog (запускает внешнюю программу под root) или module(load=\"im…\")/устаревший $ModLoad (загружает разделяемый объект в root-демон rsyslogd). Именно поэтому это admin, а не contained operate. Управляемая поверхность — дерево drop-in /etc/rsyslog.d (дефолтный $IncludeConfig /etc/rsyslog.d/*.conf rsyslog подтягивает все drop-in). Главный /etc/rsyslog.conf — вне области: это единственный системный файл, а census требует ACL уровня каталога для rewrite-proof доступа к конфигу (per-file ACL побеждается atomic-replace), поэтому один файл в /etc нельзя выдать rewrite-proof, не выдав весь /etc — и грант на один файл отклоняется на apply на целях без per-file бэкенда. Главный конфиг админы правят вне census."

["fluent-bit.observe"]
title     = "Fluent Bit — наблюдение"
summary   = "Только чтение для Fluent Bit: запрос статуса сервиса fluent-bit и чтение /etc/fluent-bit."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на собственное дерево конфигов шиппера, без пути к root. На базовой системе Fluent Bit работает под root, поэтому rw-конфиг был бы путём исполнения кода под root — но observe только ro, поэтому контейнмент сохраняется."

["fluent-bit.operate"]
title     = "Fluent Bit — управление"
summary   = "Управление Fluent Bit: start/stop/restart сервиса fluent-bit и чтение /etc/fluent-bit (конфиг только для чтения)."
risk_note = "Contained: ограниченное управление сервисом плюс конфиг только для чтения — без rw, без пути к root. На базовой системе Fluent Bit работает под root, поэтому rw-конфиг — это эскалация (вход exec/exec_wasi запускает команды под root, а .so-плагины загружаются в root-процесс) и живёт в fluent-bit.admin, не в operate."

["fluent-bit.admin"]
title     = "Fluent Bit — администрирование"
summary   = "Администрирование Fluent Bit: start/stop/restart сервиса fluent-bit и правка /etc/fluent-bit (rw)."
risk_note = "Escalation-capable: на базовой системе Fluent Bit работает под root (юнит upstream/td-agent-bit не задаёт User=), и rw на /etc/fluent-bit — это путь исполнения/загрузки кода под root: вход exec/exec_wasi запускает команды под root, а внешние .so-плагины загружаются в root-процесс. Именно поэтому это admin, а не contained operate. Слой под конкретную ОС, задающий User=<не-root>, сделал бы rw-конфиг contained."

["telegraf.observe"]
title     = "Telegraf — наблюдение"
summary   = "Только чтение для Telegraf: запрос статуса сервиса telegraf и чтение /etc/telegraf."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на собственное дерево конфигов агента, без пути к root. Без гранта на логи: по умолчанию Telegraf пишет в journald (нет /var/log/telegraf), поэтому чтение journald относится к гранту journald/log-read, а не к этому пакету."

["telegraf.operate"]
title     = "Telegraf — управление"
summary   = "Управление Telegraf: start/stop/restart сервиса telegraf и правка /etc/telegraf (rw)."
risk_note = "Contained: демон Telegraf закреплён не под root юнитом User=telegraf, поэтому rw на /etc/telegraf даёт вход exec/execd = исполнение команд под пользователем telegraf (не root), а output-плагины могут хранить учётные данные — exec-as-app-user, не эскалация. Это прецедент redis (демон не под root → rw в operate, без admin-уровня). Оговорка: слой под конкретную ОС, чей юнит не задаёт User=, запускает демон под root и должен быть переоценён (rw-конфиг + restart становится путём исполнения кода под root)."

["openvpn.observe"]
title     = "OpenVPN — наблюдение"
summary   = "Только чтение для OpenVPN: запрос статуса инстанс-юнита openvpn-server@server и чтение /etc/openvpn."
risk_note = "Contained: только чтение статуса сервиса плюс ACL ro на /etc/openvpn, без мутаций, без пути к root. Имя инстанса зависит от развёртывания (юнит — шаблон, один инстанс на каждый туннель), роль его переопределяет. ВНИМАНИЕ: /etc/openvpn хранит ПРИВАТНЫЕ КЛЮЧИ и сертификаты туннеля, поэтому даже доступ только для чтения раскрывает секреты — это раскрытие учётных данных, не эскалация."

["openvpn.operate"]
title     = "OpenVPN — управление"
summary   = "Управление OpenVPN: start/stop/restart инстанса openvpn-server@server и чтение /etc/openvpn (конфиг только для чтения)."
risk_note = "Contained: ограниченное управление сервисом плюс конфиг только для чтения — без rw, без пути к root. Запуск туннеля исполняет только проверенный конфиг на диске и его существующие хуки. rw на /etc/openvpn — это эскалация (скрипты up/down/route-up выполняются под root при script-security 2, а директива plugin загружает .so в root-процесс) и живёт в openvpn.admin, не в operate. ВНИМАНИЕ: /etc/openvpn хранит приватные ключи туннеля, поэтому встроенный грант ro всё равно раскрывает секреты."

["openvpn.admin"]
title     = "OpenVPN — администрирование"
summary   = "Администрирование OpenVPN: start/stop/restart инстанса openvpn-server@server и правка /etc/openvpn (rw)."
risk_note = "Escalation-capable: OpenVPN создаёт устройство tun и выполняет скрипты up/down/route-up/learn-address под root при script-security 2, а директива plugin загружает .so в root-процесс openvpn. Он может сбросить привилегии до user nobody после инициализации, но скрипты и плагин выполняются под root, поэтому rw на /etc/openvpn направляет root-процесс на подставленные скрипты/код — путь исполнения кода под root. Именно поэтому это admin, а не contained operate. Имя инстанса зависит от развёртывания; роль его переопределяет."

["wireguard.observe"]
