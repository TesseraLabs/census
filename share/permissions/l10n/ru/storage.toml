[mount-removable]
title     = "Монтирование съёмных носителей"
summary   = "Монтирование и размонтирование съёмных томов (udisksctl, mount, umount)."
risk_note = "Произвольный mount может перекрыть доверенные пути (напр. поверх /etc) — примитив эскалации."

[disk-admin]
title     = "Администрирование дисков"
summary   = "Разметка дисков и создание ФС/LVM (parted, fdisk, mkfs.*, lvm)."
risk_note = "Деструктивно и на уровне root: может переразметить или стереть любое блочное устройство."

[luks-admin]
title     = "Администрирование шифрования LUKS"
summary   = "Управление томами, зашифрованными LUKS (cryptsetup)."
risk_note = "Управляет ключами и заголовками шифрования диска — может заблокировать или раскрыть данные."

[swap-admin]
title     = "Администрирование подкачки"
summary   = "Управление swap и zram (swapon, swapoff, mkswap, zramctl)."
risk_note = "Contained: вкл/выкл swap; злоупотребление влияет на нагрузку памяти, не на привилегии."

[fstab-config]
title     = "Настройка монтирования ФС"
summary   = "Управление постоянными монтированиями и их проверка (mount, findmnt, systemctl)."
risk_note = "Подложенная в /etc/fstab точка монтирования поверх системного пути даёт root при следующем монтировании/загрузке."

[backup-operator]
title     = "Оператор резервного копирования"
summary   = "Резервное копирование всей ФС (restic, borg, rsync, tar) через группу backup."
risk_note = "Читает всю файловую систему для бэкапа — полное раскрытие всех секретов на диске."

[quota-admin]
title     = "Администрирование дисковых квот"
summary   = "Управление и отчёты по квотам ФС (setquota, repquota, quotacheck)."
risk_note = "Contained: ограничивает использование диска; путей к привилегиям хоста нет."
