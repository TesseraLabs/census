[package-query]
title     = "Запрос пакетов"
summary   = "Перечисление и осмотр установленных пакетов (apt, dpkg)."
risk_note = "Только чтение: сообщает, что установлено, ничего не ставит."

[package-install]
title     = "Установка пакетов"
summary   = "Установка и удаление пакетов (apt-get, apt, dpkg)."
risk_note = "Скрипты сопровождения пакета исполняются от root — выполнение произвольного кода по дизайну."

[repo-config]
title     = "Настройка репозиториев"
summary   = "Управление источниками APT и работа apt с ними (apt-get, apt)."
risk_note = "Добавление репозитория — точка входа supply-chain: доверенный источник пакетов уровня root."

[apt-policy]
title     = "Настройка политики APT"
summary   = "Настройка поведения APT и автообновлений (apt-config, unattended-upgrade)."
risk_note = "Contained: настраивает политику обновлений; опирается на уже доверенные источники."
